# eclexiaiser manifest — energy/carbon resource budgets
# SPDX-License-Identifier: PMPL-1.0-or-later

[project]
name = "bitfuckit"

[[functions]]
name = "Do_Mirror"
source = "src/bitfuckit.adb"
energy-budget-mj = 50.0
carbon-budget-mg = 10.0

[[functions]]
name = "Do_PR_List"
source = "src/bitfuckit.adb"
energy-budget-mj = 20.0
carbon-budget-mg = 4.0

[carbon]
provider = "static"
region = "GB"
static-intensity = 200.0

[report]
format = "text"
include-recommendations = true
