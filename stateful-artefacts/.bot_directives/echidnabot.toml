# echidnabot.toml — Code quality enforcement for stateful-artefacts

[echidnabot]
version = "1.0"
repo = "hyperpolymath/stateful-artefacts"

[quality]
# Haskell-specific quality checks
enforce_spdx_headers = true
allowed_licenses = ["PMPL-1.0-or-later", "MPL-2.0"]
banned_licenses = ["AGPL-3.0-or-later", "AGPL-3.0"]

[critical_patterns]
# Patterns that should be flagged as CRITICAL
haskell_banned = [
    "unsafeCoerce",
    "unsafePerformIO",
    "undefined",
    "error \"",
]

[language_policy]
primary = "haskell"
allowed = ["haskell", "bash", "guile-scheme"]
banned = ["python", "typescript", "go"]
