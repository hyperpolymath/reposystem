# Dependabot configuration for RSR-compliant repositories

version: 2
updates:
  # GitHub Actions - always include
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  # Rust/Cargo - root workspace
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"

  # Rust/Cargo - GUI (Tauri)
  - package-ecosystem: "cargo"
    directory: "/gui/src-tauri"
    schedule:
      interval: "weekly"

  # Rust/Cargo - RSR Certified engine
  - package-ecosystem: "cargo"
    directory: "/tools/rsr-certified"
    schedule:
      interval: "weekly"

  # Nix flakes
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
