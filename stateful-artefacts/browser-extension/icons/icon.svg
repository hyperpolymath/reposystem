        fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Three horizontal data lines (metadata representation) -->
  <line x1="44" y1="92" x2="56" y2="92" stroke="#00cc66" stroke-width="4" stroke-linecap="round" />
  <line x1="60" y1="92" x2="72" y2="92" stroke="#00cc66" stroke-width="4" stroke-linecap="round" />
  <line x1="76" y1="92" x2="84" y2="92" stroke="#00cc66" stroke-width="4" stroke-linecap="round" />
</svg>
