<!-- Gnosis - Stateful Artefacts Viewer icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0066cc" />
  <!-- Inner ring for depth -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3" />
  <!-- Stylized "G" letterform -->
